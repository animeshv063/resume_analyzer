name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v2

    - name: Build Docker Image
      run: docker build -t resume-analyzer .

    - name: Run Container (Test)
      run: docker run -d -p 8501:8501 resume-analyzer
