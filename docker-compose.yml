version: '3.8'

services:
  frontend:
    build: .
    container_name: resume-frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend

  backend:
    build: .
    container_name: resume-backend
    command: uvicorn backend.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
